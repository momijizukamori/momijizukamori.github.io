<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>TKRB Chiyoko/Kabocha Helper</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Delius&display=swap" rel="stylesheet">
	<link rel="stylesheet" type="text/css" href="tkrb.css">
	<style type="text/css">

		:root {
			--grid-line-color: red;
			--panel-color: #444;
		}

		main {display: flex;
			flex-wrap: wrap;
			row-gap: 1.5em;
			column-gap: 0.5em;
			justify-content: center;}

		.image {position: relative;}

		.name {text-align: center;}
		.overlay {
			position: absolute;
			top: 0;
			left: 0;
		}

		.sword.scale-100 {
			width: 300px;
			font-size:1.25em;
		}

		.sword.scale-50 {
			width: 150px;
		}

		.sword.scale-33{
			width:100px;
			font-size: small;
		}

		.sword.scale-100 img, .sword.scale-100 .overlay {
			width: 300px;
			height: 300px;
		}

		.sword.scale-50 img, .sword.scale-50 .overlay {
			width: 150px;
			height: 150px;
		}

		.sword.scale-33 img, .sword.scale-33 .overlay {
			width: 100px;
			height: 100px;
		}

		.overlay {
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			grid-template-rows: repeat(3, 1fr);
			grid-column-gap: 0px;
			grid-row-gap: 0px;
		}

.div1 { grid-area: 1 / 1 / 2 / 2; }
.div2 { grid-area: 1 / 2 / 2 / 3; 
		}
.div3 { grid-area: 1 / 3 / 2 / 4; }
.div4 { grid-area: 2 / 1 / 3 / 2; }
.div5 { grid-area: 2 / 2 / 3 / 3; 
		border: 1px solid var(--grid-line-color);}
.div6 { grid-area: 2 / 3 / 3 / 4; }
.div7 { grid-area: 3 / 1 / 4 / 2; }
.div8 { grid-area: 3 / 2 / 4 / 3; }
.div9 { grid-area: 3 / 3 / 4 / 4; }

.div2, .div8 {
			border-left: 1px solid var(--grid-line-color);
		border-right: 1px solid var(--grid-line-color);
}

.div4, .div6 {
			border-top: 1px solid var(--grid-line-color);
		border-bottom: 1px solid var(--grid-line-color);
}

.div1, .div2, .div3, .div4, .div5, .div6, .div7, .div8, .div9 {
	background-color: var(--panel-color);
}

div.clear {background-color: transparent;}
.hide {display: none;}

#top::before {
	content:url("top.svg");
	height:81px;
	width:80px;
	z-index:2;
	color: currentColor;

}

#bottom::before {
	content:url("bottom.svg");
	height:81px;
	width:80px;
	z-index:2;
	color:currentColor;

}

.controls {
	padding:2em;
	display:flex;
	flex-wrap:wrap;
}

.limited .overlay {
	box-shadow: 0px 0px 3px 3px gold;
}

	</style>

	<script src="https://cdn.jsdelivr.net/npm/umbrellajs"></script>
</head>
<body>
			<div class="controls">
				<fieldset>
					<legend>
						Square scale
					</legend>
					<div class="radio-input">
						<label class="label">
						  <input type="radio" id="scale-100" name="value-radio" value="scale-100" />
						  <span class="text">100%</span>
						</label>
						<label class="label">
						  <input type="radio" id="scale-50" name="value-radio" value="scale-50" />
						  <span class="text">50%</span>
						</label>
						<label class="label">
						  <input type="radio" id="scale-33" name="value-radio" value="scale-33" />
						  <span class="text">33%</span>
						</label>
					  </div>
					  
				</fieldset>
				<button id="bottom" class="top" type="button"><span>Show Legs</span></button>
				<button id="top" class="bottom hide" type="button"><span>Show Head</span>></button>

				<button id="show" type="button"><span>Show All</span></button>
				<button id="hide" type="button"><span>Hide All</span></button>
			</div>
	<main>
%PORTRAITS%
	</main>



<script type="text/javascript">
	u(".overlay div").on('click', function (e) {
		let square = u(e.currentTarget).data('square');
		u(`.${square}`).toggleClass('clear')
	});

	u("#top, #bottom").on('click', function (e) {
		u(`.top, .bottom`).toggleClass('hide');
	});

	u('.controls fieldset input').on('change', function (e) {
		let scale = e.currentTarget.id;
		u('.sword').removeClass('scale-100', 'scale-50', 'scale-33')
		u('.sword').addClass(scale);
	});

	u("#show").on('click', function (e) {
		u('.div1, .div2, .div3, .div4, .div5, .div6, .div7, .div8, .div9').addClass('clear');
	});

	u("#hide").on('click', function (e) {
		u('.div1, .div2, .div3, .div4, .div5, .div6, .div7, .div8, .div9').removeClass('clear');
	});

	let scale = u('.controls fieldset input').filter(':checked').first().id;
	if (scale) {
		u('.sword').removeClass('scale-100', 'scale-50', 'scale-33')
		u('.sword').addClass(scale);
	}



</script>
</body>
</html>
